<article
  class="ticket-slot"
  [class.ticket-slot--bonus]="variant() === 'bonus'"
  [class.ticket-slot--spinning]="spinning()"
  [class.ticket-slot--selected]="selected()"
>
  <p class="ticket-slot__label">{{ label() }}</p>
  <div
    class="ticket-slot__token"
    [class.ticket-slot__token--bonus]="variant() === 'bonus'"
    [class.ticket-slot__token--spinning]="spinning()"
    [class.ticket-slot__token--selected]="selected()"
  >
    <span class="ticket-slot__ring"></span>
    <span class="ticket-slot__shine"></span>
    <span class="ticket-slot__window">
      <span
        class="ticket-slot__value"
        [class.ticket-slot__value--selected]="selected()"
      >
        {{ value() ?? '?' }}
      </span>
    </span>
  </div>
</article>
